name: PR Merge Congratulations

on:
  pull_request:
    types: [closed]

jobs:
  congratulate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Post congratulations comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;
            
            const message = `## 🎉 Thank you for your contribution!
            
            **Your PR (#${prNumber}) has been merged and is now live on the main branch!**
            
            Big thanks to @${prAuthor} for your valuable work on this! 🙏
            
            ---
            
            **Merged in:** #${prNumber}
            
            ---
            
            🌟 **تبریک می‌گم!** / **Congratulations!** 🌟
            
            *کمک شما خیلی ارزشمند بود - ممنون که با ما همکاری کردی!*
            
            *Your contribution makes a difference - thanks for being part of this journey!*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message
            });
