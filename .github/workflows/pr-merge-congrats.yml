name: PR Merge Congratulations

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  congratulate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Post congratulations comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}  # ← Uses secret, not hardcoded
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;
            
            const message = `## 🎉 Thank you for your contribution!
            
            **Your PR (#${prNumber}) has been merged!**
            
            Thanks @${prAuthor}! 🙏
            
            🌟 **تبریک می‌گم!** / **Congratulations!** 🌟`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message
            });
