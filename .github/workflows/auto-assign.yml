name: Auto Assign

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    # REMOVED the if condition completely
    
    steps:
      - name: Check and assign if available
        uses: actions/github-script@v7
        with:
          script: |
            // Skip if this is a PR comment
            if (context.payload.issue.pull_request) {
              console.log('This is a PR comment, skipping');
              return;
            }
            
            const issueNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;
            
            // Get current issue to check assignees
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            // Check if issue already has assignees
            if (issue.assignees.length > 0) {
              const assignedTo = issue.assignees.map(a => '@' + a.login).join(', ');
              
              // Issue already assigned - send sorry message
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Oh no @${commenter}! 😔\n\nThis issue is already assigned to ${assignedTo}.\n\nPlease don’t worry , there are still plenty of other issues waiting for contributors like you. 🙌\n\n👉 Please find another unassigned issue to work on.\n\n**Quick tips:**\n- Check open issues without assignees\n- Read the issue description carefully\n- Comment on the issue before starting if needed\n\nThanks for understanding, and happy coding! 🚀`
              });
              
              console.log(`Issue #${issueNumber} already assigned to ${assignedTo}`);
              return;
            }
            
            // Issue is free - assign the commenter
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [commenter]
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Hey @${commenter}! 👋\n\nThanks for claiming this issue! You've been successfully assigned. 🎉\n\n**Next steps:**\n⭐ Star our repository\n🍴 Fork our repository\n🔨 Make the changes described above\n📬 Submit a Pull Request linking to this issue\n⏳ Wait for review and feedback!\n\nGood luck and happy coding! 🚀\n\nموفق باشید`
            });
            
            console.log(`✅ Assigned @${commenter} to issue #${issueNumber}`);
